name: PR Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - '*/src/**'
      - '*/pom.xml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build
        run: ./build.sh
      - name: Start services
        run: ./run.sh &
      - name: Wait
        run: sleep 70
      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/k6
      - name: Smoke test
        working-directory: load-tests
        run: k6 run k6/smoke.js
