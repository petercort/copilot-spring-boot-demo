name: Weekly Chaos Tests

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC
  workflow_dispatch:

jobs:
  chaos-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build services
        run: ./build.sh
      - name: Start services
        run: |
          ./run.sh &
          sleep 60
      - name: Verify steady state
        run: bash scripts/verify-steady-state.sh
      - name: Run all chaos scenarios
        run: bash scenarios/run-all-chaos.sh
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results
          path: results/chaos-*.log
