spring.application.name=order-service
server.port=8083

# Virtual threads (JDK 25)
spring.threads.virtual.enabled=true

spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

logging.level.com.fisglobal.order=DEBUG
logging.level.org.springframework.web=INFO

# ── Feign Timeouts ────────────────────────────────────────────────────────
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.customer-service.connectTimeout=2000
spring.cloud.openfeign.client.config.customer-service.readTimeout=5000
spring.cloud.openfeign.client.config.inventory-service.connectTimeout=2000
spring.cloud.openfeign.client.config.inventory-service.readTimeout=5000

# ── Resilience4j Circuit Breakers ─────────────────────────────────────────
# Shared CB config applied to all Feign-generated CB instance names via baseConfig
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=4s

# Feign auto-generates CB names as {ClientName}{methodName}{ParamTypes}
resilience4j.circuitbreaker.instances.CustomerServiceClientgetCustomerByIdLong.baseConfig=default
resilience4j.circuitbreaker.instances.InventoryServiceClientgetProductByIdLong.baseConfig=default
resilience4j.circuitbreaker.instances.InventoryServiceClientreserveStockLongInteger.baseConfig=default
resilience4j.circuitbreaker.instances.InventoryServiceClientrestoreStockLongInteger.baseConfig=default

# ── Resilience4j TimeLimiter ──────────────────────────────────────────────
# Must match Feign CB auto-generated names; default is 1s which causes load-spike 500s
resilience4j.timelimiter.instances.CustomerServiceClientgetCustomerByIdLong.timeoutDuration=5s
resilience4j.timelimiter.instances.CustomerServiceClientgetCustomerByIdLong.cancelRunningFuture=true
resilience4j.timelimiter.instances.InventoryServiceClientgetProductByIdLong.timeoutDuration=5s
resilience4j.timelimiter.instances.InventoryServiceClientgetProductByIdLong.cancelRunningFuture=true
resilience4j.timelimiter.instances.InventoryServiceClientreserveStockLongInteger.timeoutDuration=5s
resilience4j.timelimiter.instances.InventoryServiceClientreserveStockLongInteger.cancelRunningFuture=true
resilience4j.timelimiter.instances.InventoryServiceClientrestoreStockLongInteger.timeoutDuration=5s
resilience4j.timelimiter.instances.InventoryServiceClientrestoreStockLongInteger.cancelRunningFuture=true

# ── Resilience4j Retry ────────────────────────────────────────────────────
resilience4j.retry.instances.customerService.maxAttempts=3
resilience4j.retry.instances.customerService.waitDuration=500ms
resilience4j.retry.instances.customerService.enableExponentialBackoff=true
resilience4j.retry.instances.customerService.exponentialBackoffMultiplier=2

resilience4j.retry.instances.inventoryService.maxAttempts=3
resilience4j.retry.instances.inventoryService.waitDuration=500ms
resilience4j.retry.instances.inventoryService.enableExponentialBackoff=true
resilience4j.retry.instances.inventoryService.exponentialBackoffMultiplier=2

# ── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,chaosmonkey
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Feign Circuit Breaker ─────────────────────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=true
