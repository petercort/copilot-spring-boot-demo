openapi: 3.0.3
info:
  title: Product Inventory Service API
  version: 1.0.0
servers:
  - url: http://product-inventory-service:8082
paths:
  /api/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/products/{id}/reserve:
    post:
      summary: Reserve stock for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: quantity
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Reservation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationResult"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/products/{id}/restore:
    post:
      summary: Restore stock for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: quantity
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationResult"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - sku
        - price
        - stockQuantity
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
        category:
          type: string
        reorderLevel:
          type: integer
        active:
          type: boolean
    StockOperationResult:
      type: object
      required:
        - productId
        - quantity
        - success
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
        success:
          type: boolean
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
